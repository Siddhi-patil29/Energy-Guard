<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - EnergyGuard</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .auth-card {
            background: rgba(10, 25, 41, 0.8);
            border: 1px solid rgba(0, 212, 170, 0.2);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .auth-card h2 {
            margin-bottom: 24px;
            color: var(--text);
        }

        .auth-error {
            color: #ff4f5b;
            margin-bottom: 16px;
            font-size: 0.9rem;
            display: none;
        }

        .auth-input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>

    <div class="auth-container">
        <div class="auth-card">
            <a href="index.html" class="nav-logo" style="justify-content:center; margin-bottom:24px;">
                <div class="logo-icon">⚡</div>
                <span>Energy<span class="gradient-text">Guard</span></span>
            </a>
            <h2>Welcome Back</h2>
            <div id="authError" class="auth-error">Incorrect email or password.</div>

            <form id="loginForm">
                <input type="email" id="email" class="auth-input" placeholder="Email Address" required />
                <input type="password" id="password" class="auth-input" placeholder="Password" required />
                <button type="submit" class="btn btn-primary auth-btn" id="loginBtn">Login</button>
            </form>

            <p style="color:var(--text-muted); font-size:0.9rem;">
                Don't have an account? <a href="register.html" style="color:var(--primary);">Register here</a>
            </p>
        </div>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('authError');
            const btn = document.getElementById('loginBtn');

            btn.textContent = 'Logging in...';
            btn.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'dashboard.html';
            } catch (error) {
                errorEl.textContent = error.message;
                errorEl.style.display = 'block';
                btn.textContent = 'Login';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
