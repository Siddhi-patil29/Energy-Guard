<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - EnergyGuard</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .auth-card {
            background: rgba(10, 25, 41, 0.8);
            border: 1px solid rgba(0, 212, 170, 0.2);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .auth-card h2 {
            margin-bottom: 24px;
            color: var(--text);
        }

        .auth-error {
            color: #ff4f5b;
            margin-bottom: 16px;
            font-size: 0.9rem;
            display: none;
        }

        .auth-input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="auth-container">
        <div class="auth-card">
            <a href="index.html" class="nav-logo" style="justify-content:center; margin-bottom:24px;">
                <div class="logo-icon">⚡</div>
                <span>Energy<span class="gradient-text">Guard</span></span>
            </a>
            <h2>Create Account</h2>
            <div id="authError" class="auth-error">Error message here.</div>

            <form id="registerForm">
                <input type="text" id="name" class="auth-input" placeholder="Full Name" required />
                <input type="email" id="email" class="auth-input" placeholder="Email Address" required />
                <input type="password" id="password" class="auth-input" placeholder="Password (min 6 chars)" required
                    minlength="6" />
                <button type="submit" class="btn btn-primary auth-btn" id="registerBtn">Register</button>
            </form>

            <p style="color:var(--text-muted); font-size:0.9rem;">
                Already have an account? <a href="login.html" style="color:var(--primary);">Login here</a>
            </p>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('authError');
            const btn = document.getElementById('registerBtn');

            btn.textContent = 'Creating account...';
            btn.disabled = true;

            try {
                // Create user in Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Update display name
                await updateProfile(user, { displayName: name });

                // Save user to Firestore
                await setDoc(doc(db, "users", user.uid), {
                    name: name,
                    email: email,
                    createdAt: new Date().toISOString()
                });

                // Initialize empty energy data
                await setDoc(doc(db, "energyData", user.uid), {
                    monthlyData: [],
                    updatedAt: new Date().toISOString()
                });

                window.location.href = 'dashboard.html';
            } catch (error) {
                errorEl.textContent = error.message;
                errorEl.style.display = 'block';
                btn.textContent = 'Register';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
